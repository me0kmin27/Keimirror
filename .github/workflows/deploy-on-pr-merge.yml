name: Deploy on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: keimirror-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: self-hosted
    environment: keimirror

    steps:
      - name: Checkout merged code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -T 10 \
            -p "${{ secrets.DEPLOY_PORT }}" \
            -t rsa,ecdsa,ed25519 \
            "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

          chmod 644 ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }}" \
            ./ \
            "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/"
