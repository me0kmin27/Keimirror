<section class="card footer-notice" aria-labelledby="footer-notice-title">
  <a class="logo footer-notice-logo" href="https://keiminem.com/" aria-label="Keiverse home">
    <img
      class="logo-image logo-image-light"
      src="assets/img/keiverse_logo_lightmode_black_transparent.png"
      width="1845"
      height="289"
      alt="Keiverse"
    >
    <img
      class="logo-image logo-image-dark"
      src="assets/img/keiverse_logo_darkmode_white_transparent.png"
      width="1845"
      height="289"
      alt=""
      aria-hidden="true"
    >
  </a>
  <div class="footer-notice-copy">
    <h2 id="footer-notice-title" data-i18n="footerNoticeTitle">Keiverse Mirror Network</h2>
    <p data-i18n="footerNoticeKrfoss">Participating mirror of krfoss, supporting public access to open-source software in Korea.</p>
    <div class="sponsor-button-frame" aria-label="GitHub Sponsors button">
      <iframe src="https://github.com/sponsors/me0kmin27/button" title="Sponsor me0kmin27" height="32" width="114" style="border: 0; border-radius: 6px;"></iframe>
    </div>
  </div>
  <div class="sponsor-modal" data-sponsor-modal hidden>
    <div class="sponsor-modal-backdrop" data-sponsor-close></div>
    <section class="sponsor-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="sponsor-modal-title" tabindex="-1">
      <button class="button sponsor-modal-close" type="button" data-sponsor-close aria-label="Close sponsor popup">×</button>
      <div class="sponsor-modal-copy">
        <span class="eyebrow sponsor-modal-kicker" data-i18n="sponsorModalKicker">GitHub Sponsors</span>
        <h2 id="sponsor-modal-title" data-i18n="sponsorModalTitle">Support Keimirror</h2>
        <p data-i18n="sponsorModalBody">Your sponsorship helps keep the public mirror infrastructure available.</p>
      </div>
      <div class="sponsor-card-frame" aria-label="GitHub Sponsors card">
        <iframe src="https://github.com/sponsors/me0kmin27/card" title="Sponsor me0kmin27" height="225" width="600" style="border: 0;"></iframe>
      </div>
    </section>
  </div>
</section>
